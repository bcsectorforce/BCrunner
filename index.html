<style>
/* Reset and full-screen canvas */
html,body {
  height:100%;
  margin:0;
  padding:0;

}

canvas {

}

<script>
/* BC Runner - single-file implementation
- Large maze world (~5000x5000)
- Tile size ~80px
- Player: cyan circle, smooth movement, collision with walls
- Enemies: red circles, homing, cannot pass through walls (now with A* pathfinding)
- Camera centers player
- Mobile on-screen controls toggleable
*/

(() =>{
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  let W = 0, H = 0;
  function resize() {
    W = canvas.width = Math.floor(window.innerWidth * devicePixelRatio);
    H = canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  window.addEventListener('resize', resize, { passive:true });
  resize();


const achievements = {
  survive200:false,
  survive300:false,
  ghost50:false
};



const iframe = document.getElementById("scPlayer");
const widget = SC.Widget(iframe);
const musicBtn = document.getElementById("musicBtn");

let playing = false;

musicBtn.addEventListener("click", () => {

  if(playing){
    widget.pause();
    musicBtn.textContent = "🎵";
  }else{
    widget.play();
    musicBtn.textContent = "🔊";
  }

  playing = !playing;

});

widget.bind(SC.Widget.Events.FINISH, function(){
  widget.seekTo(0);
  widget.play();
});

let ghostUses = 0;

const ghostTimerEl = document.getElementById("ghostTimer");


const fogStart = 50000;
const fogMax = 85000;

let fogActive = false;
const fogStartTime = fogStart;

let fogRadiusDynamic = 400;

const minimap = document.getElementById("minimap");
const miniCtx = minimap.getContext("2d");

const MINI_SIZE = 160;
minimap.width = MINI_SIZE;
minimap.height = MINI_SIZE;



  // World and maze parameters
  const TILE = 80; // approx tile size in pixels
  const WORLD_PIXELS = 7500;
  const COLS = Math.ceil(WORLD_PIXELS / TILE);
  const ROWS = Math.ceil(WORLD_PIXELS / TILE);
  const WORLD_W = COLS * TILE;
  const WORLD_H = ROWS * TILE
  
  const miniScaleX = MINI_SIZE / WORLD_W;
const miniScaleY = MINI_SIZE / WORLD_H;

  // Maze grid: 2D array of booleans: true = wall, false = empty
  const maze = new Array(ROWS);
  for (let r=0;r<ROWS;r++){
    maze[r] = new Array(COLS);
    for (let c=0;c<COLS;c++){
      // Randomly assign walls ~30%
      maze[r][c] = Math.random() < 0.30;
    }
  }

  // Ensure spawn area near center is open
  const centerRow = Math.floor(ROWS/2);
  const centerCol = Math.floor(COLS/2);
  for (let r=centerRow-2;r <= centerRow+2;r++){
    for (let c=centerCol-2;c <= centerCol+2;c++){
      if (r>=0 && r<ROWS && c>=0 && c<COLS) maze[r][c] = false;
    }
  }

  // Utility: clamp
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  // Circle-rectangle collision: circle at (cx,cy) radius r, rect at (rx,ry) size rw,rh
  function circleRectCollision(cx,cy,r, rx,ry,rw,rh){
    const nearestX = clamp(cx, rx, rx+rw);
    const nearestY = clamp(cy, ry, ry+rh);
    const dx = cx - nearestX;
    const dy = cy - nearestY;
    return (dx*dx + dy*dy) < (r*r);
  }

  // Check if circle collides with any wall tile at given world coords
  function collidesWithWalls(x,y,r){
    // Determine tile range to check
    const left = Math.floor((x- r) / TILE);
    const right = Math.floor((x + r) / TILE);
    const top = Math.floor((y - r) / TILE);
    const bottom = Math.floor((y + r) / TILE);
    for (let tr = top; tr <= bottom; tr++){
      if (tr < 0 || tr >= ROWS) continue;
      for (let tc = left; tc <= right; tc++){
        if (tc < 0 || tc >= COLS) continue;
        if (maze[tr][tc]) {
          const rx = tc * TILE;
          const ry = tr * TILE;
          if (circleRectCollision(x,y,r, rx,ry,TILE,TILE)) return true;
        }
      }
    }
    return false;
  }

  // Player
  const player = {
    x: (centerCol + 0.5) * TILE,
    y: (centerRow + 0.5) * TILE,
    r: 12,
    speed: 180, // pixels per second
    vx: 0,
    vy: 0
  };

let spawnCircleActive = true;
let spawnCircleRadius = player.r * 10;
let spawnCircleFade = 1;

const countdownEl = document.getElementById("countdown");
let countdown = 5;

const countdownInterval = setInterval(()=>{

  countdown--;
  countdownEl.textContent = countdown;

  if(countdown <= 0){

    clearInterval(countdownInterval);

    const fadeInterval = setInterval(()=>{

      spawnCircleFade -= 0.05;

      if(spawnCircleFade <= 0){
        spawnCircleFade = 0;
        spawnCircleActive = false;
        countdownEl.style.display = "none";
        clearInterval(fadeInterval);
      }

    },50);

  }

},1000);
  // Camera
  const camera = { x:0, y:0 }; // top-left world coords shown at canvas 0,0

  // Input state
  const input = { up:false, down:false, left:false, right:false };
  window.addEventListener('keydown', (e) => {
    switch(e.key){
      case 'ArrowUp': case 'w': case 'W': input.up = true; e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': input.down = true; e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': input.left = true; e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': input.right = true; e.preventDefault(); break;
    }
  }, { passive:false });
  window.addEventListener('keyup', (e) => {
    switch(e.key){
      case 'ArrowUp': case 'w': case 'W': input.up = false; break;
      case 'ArrowDown': case 's': case 'S': input.down = false; break;
      case 'ArrowLeft': case 'a': case 'A': input.left = false; break;
      case 'ArrowRight': case 'd': case 'D': input.right = false; break;
    }
  });

  // Mobile controls
  const controls = document.getElementById('controls');
  const toggleControls = document.getElementById('toggleControls');
  const controlButtons = controls.querySelectorAll('button[data-dir]');
  let controlsVisible = false;
  toggleControls.addEventListener('click', () => {
    controlsVisible = !controlsVisible;
    controls.style.display = controlsVisible ? 'grid' : 'none';
    controls.setAttribute('aria-hidden', (!controlsVisible).toString());
    toggleControls.setAttribute('aria-pressed', controlsVisible.toString());
  });

  controlButtons.forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[dir] = true; }, { passive:false });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); input[dir] = false; }, { passive:false });
    btn.addEventListener('mousedown', (e) => { e.preventDefault(); input[dir] = true; });
    btn.addEventListener('mouseup', (e) => { e.preventDefault(); input[dir] = false; });
    btn.addEventListener('mouseleave', (e) => { input[dir] = false; });
  });

  // Enemies
  const enemies = [];
  
  const yellowEnemies = [];
  
  // Ghost power-up
let ghostPower = null;
let ghostActive = false;
let ghostEndTime = 0;
  function randomOpenPosition() {
    // pick random tile until open found
    for (let attempts=0; attempts<2000; attempts++){
      const r = Math.floor(Math.random()*ROWS);
      const c = Math.floor(Math.random()*COLS);
      if (!maze[r][c]) {
        // place near center of tile
        const x = (c + 0.5) * TILE + (Math.random()*TILE - TILE/2) * 0.4;
        const y = (r + 0.5) * TILE + (Math.random()*TILE - TILE/2) * 0.4;
        // ensure not too close to player
        const dx = x - player.x, dy = y - player.y;
        if (Math.hypot(dx,dy) > 200) return {x,y};
      }
    }
    // fallback: center
    return { x: player.x + 300, y: player.y + 300 };
  }

  // --- Pathfinding and enemy behavior additions ---
  // Parameters (tweak for performance/behavior)
  const REPATH_INTERVAL = 0.35; // seconds between automatic replans
  const REPATH_PLAYER_MOVE_THRESHOLD = TILE * 0.5; // player movement to force replan
  const WAYPOINT_REACH_DIST = 13; // world px to consider waypoint reached
  const ENEMY_MAX_SPEED_MATCH_PLAYER = true; // set enemies to player's speed

  // Tile/world helpers
  function worldToTile(x, y) {
    return { r: Math.floor(y / TILE), c: Math.floor(x / TILE) };
  }
  function tileToWorldCenter(r, c) {
    return { x: (c + 0.5) * TILE, y: (r + 0.5) * TILE };
  }
  function inBounds(r, c) {
    return r >= 0 && r < ROWS && c >= 0 && c < COLS;
  }

  // A* pathfinder on maze grid (returns array of {x,y} world waypoints or null)
  function findPath(startX, startY, goalX, goalY) {
    const start = worldToTile(startX, startY);
    const goal = worldToTile(goalX, goalY);
    if (!inBounds(start.r, start.c) || !inBounds(goal.r, goal.c)) return null;
    if (maze[goal.r][goal.c]) return null; // goal inside wall

    const key = (r, c) => (r << 16) | (c & 0xffff);

    // Heuristic: Euclidean
    const h = (r, c) => {
      const dx = (goal.c - c);
      const dy = (goal.r - r);
      return Math.hypot(dx, dy);
    };

    // 8-direction neighbors (allow diagonal if both adjacent tiles free)
    const neighbors = (r, c) => {
      const out = [];
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (!inBounds(nr, nc)) continue;
          if (maze[nr][nc]) continue;
          // prevent cutting corners through diagonal between two walls
          if (Math.abs(dr) + Math.abs(dc) === 2) {
            if (maze[r + dr][c] || maze[r][c + dc]) continue;
          }
          out.push({ r: nr, c: nc });
        }
      }
      return out;
    };

    // A* open set (simple array)
    const open = [];
    const gScore = new Map();
    const fScore = new Map();
    const cameFrom = new Map();

    const startKey = key(start.r, start.c);
    gScore.set(startKey, 0);
    fScore.set(startKey, h(start.r, start.c));
    open.push({ r: start.r, c: start.c, f: fScore.get(startKey) });

    while (open.length) {
      // pop lowest f (linear search)
      let bestIdx = 0;
      for (let i = 1; i < open.length; i++) if (open[i].f < open[bestIdx].f) bestIdx = i;
      const cur = open.splice(bestIdx, 1)[0];
      const curKey = key(cur.r, cur.c);
      if (cur.r === goal.r && cur.c === goal.c) {
        // reconstruct path
        const pathTiles = [];
        let k = curKey;
        while (k !== undefined) {
          const r = k >> 16;
          const c = k & 0xffff;
          pathTiles.push({ r, c });
          k = cameFrom.get(k);
        }
        pathTiles.reverse();
        const waypoints = pathTiles.map(t => tileToWorldCenter(t.r, t.c));
        return waypoints;
      }

      for (const nb of neighbors(cur.r, cur.c)) {
        const nbKey = key(nb.r, nb.c);
        const tentativeG = gScore.get(curKey) + Math.hypot(nb.r - cur.r, nb.c - cur.c);
        if (!gScore.has(nbKey) || tentativeG < gScore.get(nbKey)) {
          cameFrom.set(nbKey, curKey);
          gScore.set(nbKey, tentativeG);
          const f = tentativeG + h(nb.r, nb.c);
          fScore.set(nbKey, f);
          if (!open.some(o => o.r === nb.r && o.c === nb.c)) open.push({ r: nb.r, c: nb.c, f });
        }
      }
    }
    return null; // no path
  }

  // Spawn: set enemy speed to match player if desired
  function drawMinimap(){

  miniCtx.clearRect(0,0,MINI_SIZE,MINI_SIZE);

  // background radar look
  miniCtx.fillStyle = "rgba(0,0,0,0.6)";
  miniCtx.fillRect(0,0,MINI_SIZE,MINI_SIZE);

  // draw enemies
  miniCtx.fillStyle = "#ff3b3b";
  for(const e of enemies){

    const mx = e.x * miniScaleX;
    const my = e.y * miniScaleY;

    miniCtx.beginPath();
    miniCtx.arc(mx,my,2.5,0,Math.PI*2);
    miniCtx.fill();
  }

miniCtx.fillStyle = "#ffd93b";
for(const y of yellowEnemies){

  const mx = y.x * miniScaleX;
  const my = y.y * miniScaleY;

  miniCtx.beginPath();
  miniCtx.arc(mx,my,2.5,0,Math.PI*2);
  miniCtx.fill();
}

  // draw ghost power-up
if(ghostPower){
  const gx = ghostPower.x * miniScaleX;
  const gy = ghostPower.y * miniScaleY;

  miniCtx.beginPath();
  miniCtx.fillStyle = "#a0ffff"; // same color as in world
  miniCtx.arc(gx, gy, 3.5, 0, Math.PI*2);
  miniCtx.fill();

  // glow ring
  miniCtx.beginPath();
  miniCtx.strokeStyle = "rgba(160,255,255,0.7)";
  miniCtx.lineWidth = 1;
  miniCtx.arc(gx, gy, 6, 0, Math.PI*2);
  miniCtx.stroke();
}
  
  // draw player
  const px = player.x * miniScaleX;
  const py = player.y * miniScaleY;

  miniCtx.beginPath();
  miniCtx.fillStyle = "#00f0ff";
  miniCtx.arc(px,py,4,0,Math.PI*2);
  miniCtx.fill();




  // player glow
  miniCtx.beginPath();
  miniCtx.strokeStyle = "rgba(0,240,255,0.6)";
  miniCtx.lineWidth = 1;
  miniCtx.arc(px,py,7,0,Math.PI*2);
  miniCtx.stroke();
}
  
  function spawnEnemyAtRandom() {
    const pos = randomOpenPosition();
    const e = {
      x: pos.x,
      y: pos.y,
      r: 10 + Math.random() * 6,
      speed: ENEMY_MAX_SPEED_MATCH_PLAYER ? player.speed * 0.65 : (60 + Math.random() * 40),
      path: null,
      pathIndex: 0,
      repathTimer: Math.random() * REPATH_INTERVAL, // stagger replans
      lastPlayerPos: { x: player.x, y: player.y }
    };
    enemies.push(e);
    
    
    
  }
  
  function spawnYellowEnemy(){
  const pos = randomOpenPosition();

  yellowEnemies.push({
    x: pos.x,
    y: pos.y,
    r: 8,
    speed: player.speed,

    path: null,
    pathIndex: 0,
    repathTimer: Math.random() * REPATH_INTERVAL,
    lastPlayerPos: { x: player.x, y: player.y }
  });
}
  
  function spawnGhostPower(){
  const pos = randomOpenPosition();
  ghostPower = {
    x: pos.x,
    y: pos.y,
    r: 10
  };
}

  // initial enemies
  for (let i=0;i<10;i++) spawnEnemyAtRandom();
  
  // start with 1 yellow enemies
spawnYellowEnemy();

// add more every 30 seconds
setInterval(()=>{
  if(alive){
    spawnYellowEnemy();
  }
},49000);

  // spawn more every 30 seconds
  let spawnIntervalId = null;
  function startSpawning() {
    spawnIntervalId = setInterval(() => {
      for (let i=0;i<3;i++) spawnEnemyAtRandom();
    }, 30000);
  }
  
  setInterval(() => {
  if(!ghostPower && alive){
    spawnGhostPower();
  }
}, 10000);

  // Time survived
const timeEl = document.getElementById('timeSurvived');
const bestTimeEl = document.getElementById('bestTime');

let bestTime = parseFloat(localStorage.getItem("bcRunnerBestTime")) || 0;
bestTimeEl.textContent = bestTime.toFixed(1);
  let startTime = performance.now();
  let lastTime = startTime;
  let alive = true;

  // Movement helper: attempt to move circle with collision resolution
  function attemptMove(entity, dx, dy) {
    // Try full move
    const nx = entity.x + dx;
    const ny = entity.y + dy;
    if (!collidesWithWalls(nx, ny, entity.r)) {
      entity.x = nx; entity.y = ny;
      return;
    }
    // If blocked, try axis-aligned sliding
    if (!collidesWithWalls(entity.x + dx, entity.y, entity.r)) {
      entity.x += dx; return;
    }
    if (!collidesWithWalls(entity.x, entity.y + dy, entity.r)) {
      entity.y += dy; return;
    }
    // else blocked; try small incremental steps to slide around
    const steps = 6;
    for (let i=1;i <= steps;i++){
      const fx = dx * (i/steps);
      const fy = dy * (i/steps);
      if (!collidesWithWalls(entity.x + fx, entity.y + fy, entity.r)) {
        entity.x += fx; entity.y += fy; return;
      }
    }
    // cannot move
  }

  // Update enemies: path-following A* based movement
  function updateEnemies(dt) {
    // track player movement for threshold-based replanning
    const playerMovedDist = Math.hypot(player.x - (updateEnemies._lastPlayerX || player.x), player.y - (updateEnemies._lastPlayerY || player.y));
    updateEnemies._lastPlayerX = player.x;
    updateEnemies._lastPlayerY = player.y;

    for (const e of enemies) {
      // decrement timer
      e.repathTimer -= dt;

      // decide whether to replan
      const needRepath = (
  e.path === null ||
  e.repathTimer <= 0
);

      if (needRepath) {
        const newPath = findPath(e.x, e.y, player.x, player.y);
        if (newPath && newPath.length > 0) {
          e.path = newPath;
e.pathIndex = 1; // skip the tile we are already in
        } else {
          // fallback: direct homing if no path found
          e.path = null;
        }
        e.repathTimer = REPATH_INTERVAL;
        e.lastPlayerPos.x = player.x;
        e.lastPlayerPos.y = player.y;
      }

      // Movement: follow path if available, else direct homing
      let targetX, targetY;
      if (e.path && e.pathIndex < e.path.length) {
        const wp = e.path[e.pathIndex];
        targetX = wp.x;
        targetY = wp.y;
        const d = Math.hypot(targetX - e.x, targetY - e.y);
        if (d < WAYPOINT_REACH_DIST) {
          e.pathIndex++;
          if (e.pathIndex >= e.path.length) {
            // reached final waypoint; small direct approach to player
            targetX = player.x; targetY = player.y;
          } else {
            targetX = e.path[e.pathIndex].x;
            targetY = e.path[e.pathIndex].y;
          }
        }
      } else {
        // no path: direct homing
        targetX = player.x; targetY = player.y;
      }

      // compute velocity toward target and attempt move (keeps collision handling)

// compute velocity toward target
const dx = targetX - e.x;
const dy = targetY - e.y;
const dist = Math.hypot(dx, dy) || 1;

// Move distance for this frame
const moveDist = e.speed * dt;
const ratio = Math.min(moveDist / dist, 1);
let newX = e.x + dx * ratio;

if(spawnCircleActive){

}else{

}

// Recalculate remaining distance AFTER move
const newDx = targetX - e.x;
const newDy = targetY - e.y;
const newDist = Math.hypot(newDx, newDy);
if (newDist <= WAYPOINT_REACH_DIST) {
    e.pathIndex++;
}
    }
  }


function updateYellowEnemies(dt){

for (const e of enemies) {

  // Render function
  function renderScene() {
    // Clear
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,window.innerWidth, window.innerHeight);

    // Determine visible tile range
    const viewLeft = Math.floor(camera.x);
    const viewTop = Math.floor(camera.y);
    const viewRight = Math.ceil(camera.x + window.innerWidth);
    const viewBottom = Math.ceil(camera.y + window.innerHeight);

    const startCol = Math.floor(viewLeft / TILE);
    const endCol = Math.floor(viewRight / TILE);
    const startRow = Math.floor(viewTop / TILE);
    const endRow = Math.floor(viewBottom / TILE);

    // Draw tiles
    for (let r = startRow; r <= endRow; r++) {
      if (r < 0 || r >= ROWS) continue;
      for (let c = startCol; c <= endCol; c++) {
        if (c < 0 || c >= COLS) continue;
        if (maze[r][c]) {
          const sx = c * TILE - camera.x;
          const sy = r * TILE - camera.y;
          // wall: dark gray block
          ctx.fillStyle = '#2b2b2b';
          ctx.fillRect(Math.round(sx), Math.round(sy), TILE, TILE);
          // subtle edge
          ctx.strokeStyle = 'rgba(0,0,0,0.25)';
          ctx.lineWidth = 1;
          ctx.strokeRect(Math.round(sx)+0.5, Math.round(sy)+0.5, TILE-1, TILE-1);
        } else {
          // empty tile: keep black (no draw)
        }
      }
    }

if(spawnCircleActive || spawnCircleFade > 0){

  const cx = (centerCol + 0.5) * TILE - camera.x;
  const cy = (centerRow + 0.5) * TILE - camera.y;

  ctx.beginPath();
  ctx.strokeStyle = "rgba(0,255,255," + spawnCircleFade + ")";
  ctx.lineWidth = 4;
  ctx.arc(cx,cy,spawnCircleRadius,0,Math.PI*2);
  ctx.stroke();

}

    // Draw player
    const px = player.x - camera.x;
    const py = player.y - camera.y;
    ctx.beginPath();
    ctx.fillStyle = ghostActive ? "rgba(160,255,255,0.6)" : "#00f0ff";
    ctx.arc(px, py, player.r, 0, Math.PI*2);
    ctx.fill();
    // small highlight
    ctx.beginPath();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.arc(px - player.r*0.35, py - player.r*0.35, player.r*0.35, 0, Math.PI*2);
    ctx.fill();

    for(const y of yellowEnemies){

  const ex = y.x - camera.x;
  const ey = y.y - camera.y;

}
    
    for (const e of enemies) {

        continue;

      // dark inner

      ctx.arc(ex - e.r*0.25, ey - e.r*0.25, e.r*0.35, 0, Math.PI*2);
      ctx.fill();
    }
    
    if(ghostPower){
  const gx = ghostPower.x - camera.x;

}

 if(fogActive){

  /* MOBILE TOUCH CONTROL SYSTEM */

/* JOYSTICK CONTROL SYSTEM */

const joystick = document.getElementById("joystick");
const joyBase = document.getElementById("joyBase");
const joyStick = document.getElementById("joyStick");

let joyActive = false;
let joyTouch = null;
const JOY_RADIUS = 50;

let joyVectorX = 0;
let joyVectorY = 0;

toggleControls.addEventListener("click",()=>{

  if(joystick.style.display === "none"){
    joystick.style.display = "block";
  }else{
    joystick.style.display = "none";
  }

});

joystick.addEventListener("touchstart",(e)=>{

  const t = e.touches[0];
  joyTouch = t.identifier;
  joyActive = true;

},{passive:true});

window.addEventListener("touchmove",(e)=>{

  if(!joyActive) return;

  for(const t of e.touches){

    if(t.identifier === joyTouch){

      const rect = joyBase.getBoundingClientRect();

      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;

      let dx = t.clientX - cx;
      let dy = t.clientY - cy;

      const dist = Math.hypot(dx,dy);

      if(dist > JOY_RADIUS){
        dx = dx/dist * JOY_RADIUS;
        dy = dy/dist * JOY_RADIUS;
      }

      joyStick.style.transform = `translate(${dx}px,${dy}px)`;

      joyVectorX = dx / JOY_RADIUS;
joyVectorY = dy / JOY_RADIUS;

    }

  }

},{passive:true});

window.addEventListener("touchend",(e)=>{

  for(const t of e.changedTouches){

    if(t.identifier === joyTouch){

      joyActive = false;
      joyTouch = null;

      joyStick.style.transform = "translate(0px,0px)";
      
      joyVectorX = 0;
joyVectorY = 0;

      input.left = false;
      input.right = false;
      input.up = false;
      input.down = false;

    }

  }

},{passive:true});



let dragTouch = null;
let holdTouch = null;

function screenToWorld(x,y){
  return {
    x: x + camera.x,
    y: y + camera.y
  };
}

window.addEventListener("touchstart", (e)=>{

  for(const t of e.changedTouches){

    const world = screenToWorld(t.clientX, t.clientY);

    const dx = world.x - player.x;
    const dy = world.y - player.y;

    const dist = Math.hypot(dx,dy);

    /* TOUCH ON PLAYER = DRAG CONTROL */
    if(dist < player.r * 3 && dragTouch === null){

      dragTouch = t.identifier;

    }else if(holdTouch === null){

      /* TOUCH ELSEWHERE = HOLD DIRECTION CONTROL */
      holdTouch = t.identifier;

    }
  }

},{passive:true});


window.addEventListener("touchmove",(e)=>{

  for(const t of e.touches){

    /* DRAG PLAYER */
    if(t.identifier === dragTouch){

      const world = screenToWorld(t.clientX,t.clientY);

      const dx = world.x - player.x;
      const dy = world.y - player.y;

      const dist = Math.hypot(dx,dy) || 1;

      player.vx = (dx/dist) * player.speed;
      player.vy = (dy/dist) * player.speed;

    }

    /* HOLD SIDE OF SCREEN */
    if(t.identifier === holdTouch){

      const cx = window.innerWidth/2;
      const cy = window.innerHeight/2;

      const dx = t.clientX - cx;
      const dy = t.clientY - cy;

      input.left = false;
      input.right = false;
      input.up = false;
      input.down = false;

      if(Math.abs(dx) > Math.abs(dy)){
        if(dx > 0) input.right = true;
        else input.left = true;
      }else{
        if(dy > 0) input.down = true;
        else input.up = true;
      }

    }

  }

},{passive:true});


window.addEventListener("touchend",(e)=>{

  for(const t of e.changedTouches){

    if(t.identifier === dragTouch){
      dragTouch = null;
      player.vx = 0;
      player.vy = 0;
    }

    if(t.identifier === holdTouch){
      holdTouch = null;
      input.left = input.right = input.up = input.down = false;
    }

  }

},{passive:true});

})();
